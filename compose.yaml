services:
  db:
    image: docker.io/library/postgres:18-alpine
    environment:
      POSTGRES_USER: kalle
      POSTGRES_PASSWORD: kalle
      POSTGRES_DB: kalle
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kalle", "-d", "kalle"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db_data: