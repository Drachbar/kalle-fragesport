# Kalle Frågesport – nginx framför backend (API + Socket.IO) och frontend (SSR).
#
# HTTPS/TLS termineras av en separat proxy FRAMFÖR den här nginx:en, så vi
# lyssnar på vanlig HTTP. Viktigt: backend sätter secure-cookies bara när den
# ser proto=https, därför vidarebefordrar vi uppströmsproxyns X-Forwarded-Proto
# i stället för $scheme (som vore "http" här) – annars fungerar inte inloggning.
#
# Installation: lägg filen i /etc/nginx/sites-available/ och symlänka till
# sites-enabled/, eller i /etc/nginx/conf.d/. Den inkluderas i http-kontexten,
# så map-blocket nedan är giltigt här. Testa med `nginx -t` och ladda om.

# Behåll uppströmsproxyns proto, fall tillbaka på $scheme om headern saknas.
map $http_x_forwarded_proto $kalle_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# "upgrade" vid WebSocket, "close" annars (Socket.IO faller tillbaka på polling).
map $http_upgrade $kalle_connection_upgrade {
    default upgrade;
    ''      close;
}

upstream kalle_backend  { server 127.0.0.1:3000; }
upstream kalle_frontend { server 127.0.0.1:4000; }

server {
    listen 80;
    # Måste matcha NG_ALLOWED_HOSTS i frontend-containern.
    server_name kalle.example.com;

    # API → backend.
    location /api/ {
        proxy_pass http://kalle_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $kalle_forwarded_proto;
    }

    # Socket.IO (WebSocket) → backend. Kräver Upgrade-headrarna.
    location /socket.io/ {
        proxy_pass http://kalle_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $kalle_connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $kalle_forwarded_proto;
        proxy_read_timeout 1h;
    }

    # Allt annat → Angular SSR-servern.
    location / {
        proxy_pass http://kalle_frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $kalle_forwarded_proto;
    }
}
